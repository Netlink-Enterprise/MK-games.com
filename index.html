<!DOCTYPE html>
<html>
<head>
    <title>Neon Flight Sim</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; font-family: monospace; }
    </style>
</head>
<body>
    <div id="ui">W/S: Pitch | A/D: Roll | Speed: Constant</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. CREATE THE WORLD (Neon Grid)
        const grid = new THREE.GridHelper(2000, 100, 0xff00ff, 0x00ffff);
        scene.add(grid);

        // 2. CREATE THE PLANE (A simple "V" shape)
        const planeGroup = new THREE.Group();
        const bodyGeo = new THREE.ConeGeometry(0.5, 2, 4);
        const bodyMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2;
        planeGroup.add(body);
        scene.add(planeGroup);

        // 3. FLIGHT LOGIC
        let speed = 0.5;
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function updateFlight() {
            // Rotation logic (Pitch and Roll)
            if (keys['w']) planeGroup.rotateX(0.03); // Pitch up
            if (keys['s']) planeGroup.rotateX(-0.03); // Pitch down
            if (keys['a']) planeGroup.rotateZ(0.05); // Roll left
            if (keys['d']) planeGroup.rotateZ(-0.05); // Roll right

            // Constant forward movement based on where the plane is pointing
            planeGroup.translateZ(-speed);

            // Make the camera follow the plane
            const relativeCameraOffset = new THREE.Vector3(0, 2, 10);
            const cameraOffset = relativeCameraOffset.applyMatrix4(planeGroup.matrixWorld);
            camera.position.x = cameraOffset.x;
            camera.position.y = cameraOffset.y;
            camera.position.z = cameraOffset.z;
            camera.lookAt(planeGroup.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateFlight();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
