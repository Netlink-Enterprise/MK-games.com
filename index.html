<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sky-Bound Multiplayer | Founder: Manav Bisht</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* UI Styling */
        #ui { 
            position: absolute; top: 20px; left: 20px; color: white; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7); pointer-events: none;
        }
        #founder { font-size: 0.75em; letter-spacing: 3px; font-weight: bold; color: #ffd700; }
        
        /* Multiplayer Panel */
        #network-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8); padding: 15px;
            border-radius: 10px; border: 1px solid #0f0; color: #0f0;
            font-family: monospace; min-width: 200px;
        }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 5px; width: 100%; margin: 5px 0; }
        button { background: #0f0; color: #000; border: none; padding: 8px; width: 100%; cursor: pointer; font-weight: bold; }

        #instrument-cluster {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.8); padding: 10px 20px;
            border-radius: 10px; border: 2px solid #555; color: #0f0;
            font-family: monospace; display: flex; gap: 20px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="founder">PROJECT FOUNDER: MANAV BISHT</div>
        <h1>SKY-BOUND MULTIPLAYER v3.0</h1>
    </div>

    <div id="network-panel">
        <div id="my-id">Your ID: Connecting...</div>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID">
        <button onclick="connectToPeer()">CONNECT TO PILOT</button>
        <div id="status" style="font-size: 10px; margin-top: 5px;">Status: Standalone</div>
    </div>

    <div id="instrument-cluster">
        <div>ALT: <span id="alt-val">0</span>ft</div>
        <div>SPD: <span id="spd-val">0</span>mph</div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        // 1. ENGINE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 1500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 200, 100);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // 2. ENVIRONMENT
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10000, 10000),
            new THREE.MeshLambertMaterial({ color: 0x4a6741 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 3. THE PLAYER'S PLANE
        const planeGroup = new THREE.Group();
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xdddddd, shininess: 80 });

        const fuselage = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.2, 5, 12), bodyMat);
        fuselage.rotation.x = Math.PI / 2;
        planeGroup.add(fuselage);

        const wings = new THREE.Mesh(new THREE.BoxGeometry(8, 0.1, 1.8), bodyMat);
        wings.position.z = 0.5;
        planeGroup.add(wings);

        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.8), bodyMat);
        tail.position.set(0, 0.6, 2.2);
        planeGroup.add(tail);

        planeGroup.position.y = 100;
        scene.add(planeGroup);

        // 4. MULTIPLAYER (PEERJS)
        const peer = new Peer();
        let connection;
        const remotePlanes = {};

        peer.on('open', id => document.getElementById('my-id').innerText = "Your ID: " + id);

        peer.on('connection', conn => {
            connection = conn;
            document.getElementById('status').innerText = "Status: Connected (Host)";
            setupDataHandlers();
        });

        function connectToPeer() {
            const id = document.getElementById('friend-id').value;
            connection = peer.connect(id);
            document.getElementById('status').innerText = "Status: Connected (Client)";
            setupDataHandlers();
        }

        function setupDataHandlers() {
            connection.on('data', data => {
                if (!remotePlanes[data.id]) {
                    // Create visual for other player
                    const p = new THREE.Group();
                    const m = new THREE.MeshPhongMaterial({ color: 0xff4400 });
                    const f = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.2, 5, 8), m);
                    f.rotation.x = Math.PI/2;
                    p.add(f);
                    p.add(new THREE.Mesh(new THREE.BoxGeometry(8,0.1,1.8), m));
                    scene.add(p);
                    remotePlanes[data.id] = p;
                }
                remotePlanes[data.id].position.copy(data.pos);
                remotePlanes[data.id].rotation.copy(data.rot);
            });
        }

        // 5. FLIGHT LOOP
        let speed = 0.8;
        const keys = {};
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function update() {
            if (keys['w']) planeGroup.rotateX(0.02);
            if (keys['s']) planeGroup.rotateX(-0.02);
            if (keys['a']) planeGroup.rotateZ(0.035);
            if (keys['d']) planeGroup.rotateZ(-0.035);
            if (keys[' ']) speed = Math.min(speed + 0.01, 2.5);
            else speed = Math.max(speed - 0.005, 0.5);

            planeGroup.translateZ(-speed);

            if (planeGroup.position.y < 1) { planeGroup.position.y = 1; speed = 0; }

            // Send my data
            if (connection && connection.open) {
                connection.send({
                    id: peer.id,
                    pos: planeGroup.position,
                    rot: { x: planeGroup.rotation.x, y: planeGroup.rotation.y, z: planeGroup.rotation.z }
                });
            }

            document.getElementById('alt-val').innerText = Math.floor(planeGroup.position.y);
            document.getElementById('spd-val').innerText = Math.floor(speed * 120);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            const camOffset = new THREE.Vector3(0, 2.5, 12).applyMatrix4(planeGroup.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(planeGroup.position);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
