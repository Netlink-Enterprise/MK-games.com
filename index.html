<!DOCTYPE html>
<html>
<head>
    <title>Neon Flight Sim | Founder: Manav Bisht</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* UI Overlay */
        #ui { 
            position: absolute; top: 20px; left: 20px; color: #0ff; 
            pointer-events: none; text-shadow: 0 0 10px #0ff; 
        }
        #founder-tag { color: #fff; font-size: 0.8em; letter-spacing: 2px; }
        
        #controls { 
            position: absolute; bottom: 20px; right: 20px; 
            color: #f0f; background: rgba(0,0,0,0.8); 
            padding: 15px; border: 1px solid #f0f; font-family: monospace;
        }

        /* Speedometer Bar */
        #speed-container {
            position: absolute; bottom: 20px; left: 20px;
            width: 200px; height: 10px; border: 1px solid #0ff;
        }
        #speed-bar { width: 50%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="founder-tag">PROJECT FOUNDER: MANAV BISHT</div>
        <h1>NEON FLIGHT SIM v1.0</h1>
        <p id="stats">ALTITUDE: 0 | SPEED: 0.5</p>
    </div>

    <div id="speed-container"><div id="speed-bar"></div></div>

    <div id="controls">
        CONTROLS:<br>
        W/S - Pitch | A/D - Roll<br>
        Q/E - Yaw | SPACE - TURBO<br><br>
        CUSTOMIZE:<br>
        [1] Cyan | [2] Red | [3] Wide | [4] Slim
    </div>

    <!-- Loading Three.js from CDN (No Install) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. ENVIRONMENT (Neon Grid & Fog)
        const grid = new THREE.GridHelper(5000, 100, 0xff00ff, 0x222222);
        scene.add(grid);
        scene.fog = new THREE.Fog(0x000000, 50, 600);

        // 3. BUILD THE CUSTOM PLANE
        const planeGroup = new THREE.Group();
        
        const bodyMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const wingMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true });

        // Fuselage (Body)
        const fuselage = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.2, 4.5, 8), bodyMat);
        fuselage.rotation.x = Math.PI / 2;
        planeGroup.add(fuselage);

        // Main Wings
        const wings = new THREE.Mesh(new THREE.BoxGeometry(6, 0.05, 1.2), wingMat);
        wings.position.set(0, 0, 0.5);
        planeGroup.add(wings);

        // Tail Fin
        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.8), wingMat);
        tail.position.set(0, 0.6, 2);
        planeGroup.add(tail);

        // Cockpit
        const canopy = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true}));
        canopy.position.set(0, 0.3, -0.8);
        canopy.scale.z = 1.8;
        planeGroup.add(canopy);

        scene.add(planeGroup);

        // 4. FLIGHT STATE
        let baseSpeed = 0.5;
        let currentSpeed = 0.5;
        const keys = {};

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function updatePhysics() {
            // Steering
            if (keys['w']) planeGroup.rotateX(0.025);
            if (keys['s']) planeGroup.rotateX(-0.025);
            if (keys['a']) planeGroup.rotateZ(0.04);
            if (keys['d']) planeGroup.rotateZ(-0.04);
            if (keys['q']) planeGroup.rotateY(0.02);
            if (keys['e']) planeGroup.rotateY(-0.02);

            // Turbo Mode
            if (keys[' ']) {
                currentSpeed = THREE.MathUtils.lerp(currentSpeed, 1.5, 0.1);
            } else {
                currentSpeed = THREE.MathUtils.lerp(currentSpeed, baseSpeed, 0.1);
            }

            // Customization
            if (keys['1']) fuselage.material.color.setHex(0x00ffff);
            if (keys['2']) fuselage.material.color.setHex(0xff0000);
            if (keys['3']) wings.scale.x = 1.5;
            if (keys['4']) wings.scale.x = 0.8;

            // Movement
            planeGroup.translateZ(-currentSpeed);
            
            // UI Updates
            document.getElementById('stats').innerText = 
                `ALTITUDE: ${Math.floor(planeGroup.position.y)} | SPEED: ${currentSpeed.toFixed(2)}`;
            document.getElementById('speed-bar').style.width = (currentSpeed / 1.5 * 100) + "%";
        }

        function updateCamera() {
            const relativeOffset = new THREE.Vector3(0, 1.8, 8);
            const cameraOffset = relativeOffset.applyMatrix4(planeGroup.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(planeGroup.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
